<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Page</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #2563eb, #7c3aed);
        }

        .login-box{

            width: 350px;
            padding: 40px;

            background: rgba(255,255,255,0.1);

            border-radius: 20px;

            backdrop-filter: blur(10px);

            box-shadow: 0 0 20px rgba(0,0,0,0.3);

            color: white;
        }

        .login-box h1{
            text-align: center;
            margin-bottom: 30px;
        }

        .input-box{
            margin-bottom: 20px;
        }

        .input-box label{
            display: block;
            margin-bottom: 8px;
        }

        .input-box input{

            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 10px;

            outline: none;
        }

        .options{

            display: flex;
            justify-content: space-between;

            margin-bottom: 20px;

            font-size: 14px;
        }

        .options a{
            color: #e0e7ff;
            text-decoration: none;
        }

        .options a:hover{
            text-decoration: underline;
        }

        .btn{

            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 10px;

            background: #38bdf8;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        .btn:hover{
            background: #0ea5e9;
            transform: scale(1.03);
        }

        .register{
            text-align: center;
            margin-top: 20px;
        }

        .register a{
            color: #facc15;
            text-decoration: none;
            font-weight: bold;
        }

        .register a:hover{
            text-decoration: underline;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h1>Login</h1>

        <form>

            <div class="input-box">

                <label>Email</label>

                <input type="email" placeholder="Enter your email">

            </div>

            <div class="input-box">

                <label>Password</label>

                <input type="password" placeholder="Enter your password">

            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button class="btn">Login</button>

        </form>

        <div class="register">

            <p>
                Don't have an account?
                <a href="#">Register</a>
            </p>

        </div>

    </div>

</body>
</html>
